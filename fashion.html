<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时装系统 | 燕云十六声</title>
<link rel="icon" href="logo-icon.svg">
<style>
:root{--bg:#08080f;--card:#14141f;--border:#2a2a3a;--gold:#d4af37;--text:#e5e5eb;--muted:#8b8b9f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:0 32px}
.navbar{position:fixed;top:0;height:72px;background:rgba(13,13,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,175,55,0.3);z-index:1000;width:100%}
.nav-container{max-width:1200px;margin:0 auto;padding:0 32px;height:100%;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:14px;text-decoration:none}
.logo-icon{width:50px;height:50px;background-image:url('logo-icon.svg');background-size:contain}
.logo-text{font-size:28px;font-family:"STXingkai","KaiTi";background:linear-gradient(180deg,#ffd700,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-menu{display:flex;gap:6px;list-style:none}
.nav-menu a{padding:10px 18px;font-size:14px;color:var(--muted);border-radius:8px;text-decoration:none}
.nav-menu a:hover,.nav-menu a.active{color:var(--gold);background:rgba(212,175,55,0.12)}
.section{padding:100px 0 60px}
.page-header{text-align:center;padding:40px 0}
.page-header h1{font-size:48px;background:linear-gradient(135deg,#d4af37,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.page-header p{color:var(--muted)}
.stats{display:flex;justify-content:center;gap:40px;margin:30px 0;padding:20px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.stat{font-size:16px;color:var(--muted)}
.stat strong{color:var(--gold);font-size:24px;margin:0 4px}
.filter-bar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:30px;padding:20px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.filter-group{display:flex;gap:8px;align-items:center}
.filter-group label{color:var(--muted);margin-right:8px}
.filter-btn{padding:10px 20px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;transition:all 0.3s}
.filter-btn:hover,.filter-btn.active{background:var(--gold);border-color:var(--gold);color:#000}
.search-box{flex:1;min-width:200px;padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text)}
.fashion-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;margin-bottom:60px}
.fashion-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.3s;cursor:pointer}
.fashion-card:hover{border-color:var(--gold);transform:translateY(-4px)}
.fashion-visual{height:200px;display:flex;align-items:center;justify-content:center;position:relative}
.fashion-tag{position:absolute;top:12px;left:12px;padding:4px 12px;background:rgba(0,0,0,0.7);border-radius:12px;font-size:12px;color:var(--gold)}
.fashion-icon{font-size:72px}
.fashion-info{padding:20px}
.fashion-info h3{font-size:18px;color:var(--gold);margin-bottom:8px}
.fashion-info .desc{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.fashion-meta{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.fashion-meta .price{color:var(--gold);font-weight:600}
.dye-preview{display:flex;gap:4px;margin-top:12px}
.dye-dot{width:20px;height:20px;border-radius:50%;border:1px solid #333}
footer{background:var(--bg);padding:40px 0;border-top:1px solid var(--border);text-align:center;color:var(--muted)}
@media(max-width:768px){.stats{flex-direction:column;gap:16px}.filter-bar{flex-direction:column}.fashion-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="navbar"><div class="nav-container"><a href="index.html" class="logo"><div class="logo-icon"></div><span class="logo-text">燕云十六声</span></a><ul class="nav-menu"><li><a href="index.html">首页</a></li><li><a href="fashion.html" class="active">时装</a></li><li><a href="martial.html">武学特效</a></li><li><a href="weapon.html">武器外观</a></li><li><a href="guide.html">攻略</a></li><li><a href="upload.html">上传</a></li></ul></div></nav>

<section class="section"><div class="container">
<div class="page-header"><h1>时装系统</h1><p>WHERE WINDS MEET</p></div>
<div class="stats"><div class="stat"><strong id="total-count">0</strong>时装总数</div></div>
<div class="filter-bar">
<div class="filter-group"><label>来源类型:</label>
<button class="filter-btn active" onclick="filter('all')">全部</button>
<button class="filter-btn" onclick="filter('heming')">和鸣</button>
<button class="filter-btn" onclick="filter('shop')">商城直售</button>
<button class="filter-btn" onclick="filter('hair')">发型</button>
</div>
<input type="text" class="search-box" id="searchBox" placeholder="搜索时装名称..." oninput="search()">
</div>
<div class="fashion-grid" id="fashion-grid"></div>
</div></section>

<footer><p>© 2026 燕云十六声资料站 · 粉丝自发整理</p></footer>

<script src="data-all.js"></script>
<script>
let currentFilter = 'all';

function filter(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function search() {
  render();
}

function render() {
  const grid = document.getElementById('fashion-grid');
  const search = document.getElementById('searchBox').value.toLowerCase();
  
  let data = [];
  if (DB.heming2) data = data.concat(DB.heming2);
  if (DB.shop) data = data.concat(DB.shop);
  if (DB.hairstyles) data = data.concat(DB.hairstyles);
  
  if (currentFilter === 'heming') data = data.filter(i => i.price && i.price.includes('八音窍') && i.id < 100);
  else if (currentFilter === 'shop') data = data.filter(i => i.price && i.price.includes('长鸣珠'));
  else if (currentFilter === 'hair') data = data.filter(i => i.id >= 100);
  
  if (search) data = data.filter(i => i.name.toLowerCase().includes(search));
  
  grid.innerHTML = data.map(item => `
    <div class="fashion-card" onclick="location.href='detail.html?id=${item.id}'">
      <div class="fashion-visual" style="background:linear-gradient(135deg,${item.dyes?item.dyes[0]+'33':'#1a1a2e'},${item.dyes?item.dyes[0]+'11':'#2a2a4e'})">
        <span class="fashion-tag">${item.price||''}</span>
        <span class="fashion-icon">${item.icon||'👘'}</span>
      </div>
      <div class="fashion-info">
        <h3>${item.name}</h3>
        <p class="desc">${item.desc||''}</p>
        <div class="fashion-meta">
          <span class="price">💰 ${item.price||''}</span>
        </div>
        ${item.dyes?'<div class="dye-preview">'+item.dyes.slice(0,5).map(d=>'<div class="dye-dot" style="background:'+d+'"></div>').join('')+'</div>':''}
      </div>
    </div>
  `).join('');
  
  document.getElementById('total-count').textContent = data.length;
}

render();
</script>
</body>
</html>
