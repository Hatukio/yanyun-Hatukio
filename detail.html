<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时装详情 | 燕云十六声</title>
<link rel="icon" href="logo-icon.svg">
<style>
:root{--bg:#08080f;--card:#14141f;--border:#2a2a3a;--gold:#d4af37;--text:#e5e5eb;--muted:#8b8b9f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:0 32px}
.navbar{position:fixed;top:0;height:72px;background:rgba(13,13,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,175,55,0.3);z-index:1000;width:100%}
.nav-container{max-width:1200px;margin:0 auto;padding:0 32px;height:100%;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:14px;text-decoration:none}
.logo-icon{width:50px;height:50px;background-image:url('logo-icon.svg');background-size:contain}
.logo-text{font-size:28px;font-family:"STXingkai","KaiTi";background:linear-gradient(180deg,#ffd700,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-menu{display:flex;gap:6px;list-style:none}
.nav-menu a{padding:10px 18px;font-size:14px;color:var(--muted);border-radius:8px;text-decoration:none}
.nav-menu a:hover,.nav-menu a.active{color:var(--gold);background:rgba(212,175,55,0.12)}
.section{padding:100px 0 60px}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);text-decoration:none;margin-bottom:30px;transition:all 0.3s}
.back-btn:hover{border-color:var(--gold);color:var(--gold)}
.detail-header{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:50px}
.detail-visual{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.detail-icon{font-size:120px;margin-bottom:20px}
.detail-name{font-size:48px;background:linear-gradient(135deg,#d4af37,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.detail-info{display:flex;flex-direction:column;gap:20px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.info-card h3{font-size:18px;color:var(--gold);margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--muted)}
.info-value{color:var(--text);font-weight:500}
.price-value{color:var(--gold);font-weight:600;font-size:18px}
.dye-section{margin-top:40px}
.dye-section h2{font-size:28px;color:var(--gold);margin-bottom:20px}
.dye-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.dye-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center}
.dye-preview{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
.dye-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border)}
.upload-section{margin-top:50px}
.upload-section h2{font-size:28px;color:var(--gold);margin-bottom:20px}
.upload-tabs{display:flex;gap:12px;margin-bottom:24px}
.tab-btn{padding:12px 24px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;transition:all 0.3s}
.tab-btn:hover,.tab-btn.active{background:var(--gold);border-color:var(--gold);color:#000}
.upload-area{border:2px dashed var(--border);border-radius:16px;padding:60px;text-align:center;background:var(--card);cursor:pointer;transition:all 0.3s;margin-bottom:30px}
.upload-area:hover{border-color:var(--gold)}
.uploads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
.upload-item{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.upload-img{width:100%;height:250px;object-fit:cover;background:var(--bg)}
.upload-meta{padding:20px}
.upload-title{font-size:16px;color:var(--gold);margin-bottom:8px}
.upload-desc{font-size:13px;color:var(--muted);margin-bottom:12px}
.upload-actions{display:flex;gap:8px}
.action-btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:13px}
.action-btn:hover{border-color:var(--gold);color:var(--gold)}
.action-btn.liked{background:rgba(255,0,0,0.1);border-color:#ff4444;color:#ff4444}
.comments-section{margin-top:50px}
.comments-section h2{font-size:28px;color:var(--gold);margin-bottom:20px}
.comment-input{display:flex;gap:12px;margin-bottom:24px}
.comment-input input{flex:1;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px}
.comment-input button{padding:14px 28px;background:var(--gold);border:none;border-radius:8px;color:#000;font-weight:600;cursor:pointer}
.comment-list{display:flex;flex-direction:column;gap:16px}
.comment-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.comment-header{display:flex;justify-content:space-between;margin-bottom:8px}
.comment-author{color:var(--gold);font-weight:500}
.comment-date{color:var(--muted);font-size:13px}
.comment-text{color:var(--text);line-height:1.6}
@media(max-width:900px){.detail-header{grid-template-columns:1fr}.detail-name{font-size:36px}}
</style>
</head>
<body>
<nav class="navbar"><div class="nav-container"><a href="index.html" class="logo"><div class="logo-icon"></div><span class="logo-text">燕云十六声</span></a><ul class="nav-menu"><li><a href="index.html">首页</a></li><li><a href="fashion.html">时装</a></li><li><a href="martial.html">武学特效</a></li><li><a href="weapon.html">武器外观</a></li><li><a href="upload.html">上传</a></li></ul></div></nav>

<section class="section"><div class="container">
<a href="fashion.html" class="back-btn">← 返回时装列表</a>
<div id="detailContent"></div>
</div></section>

<script src="data-all.js"></script>
<script>
const DetailPage = {
  item: null,
  uploads: [],
  comments: [],

  init() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const type = params.get('type') || 'fashion';

    // 查找数据
    if (type === 'fashion' || type === 'hair') {
      const allFashion = [...(DB.heming2||[]), ...(DB.shop||[]), ...(DB.hairstyles||[])];
      this.item = allFashion.find(i => i.id === id);
    } else if (type === 'wuxue') {
      this.item = (DB.wuxue||[]).find(i => i.id === id);
    } else if (type === 'qishu') {
      this.item = (DB.qishu||[]).find(i => i.id === id);
    } else if (type === 'weapon') {
      this.item = (DB.weapons||[]).find(i => i.id === id);
    }

    if (!this.item) {
      document.getElementById('detailContent').innerHTML = '<p style="text-align:center;color:var(--muted)">未找到该外观</p>';
      return;
    }

    // 加载上传和评论
    this.loadStorage();
    this.render();
  },

  loadStorage() {
    try {
      const data = JSON.parse(localStorage.getItem('detail_' + this.item.id) || '{}');
      this.uploads = data.uploads || [];
      this.comments = data.comments || [];
    } catch(e) {
      this.uploads = [];
      this.comments = [];
    }
  },

  saveStorage() {
    localStorage.setItem('detail_' + this.item.id, JSON.stringify({
      uploads: this.uploads,
      comments: this.comments
    }));
  },

  handleUpload(files, category) {
    [...files].forEach(f => {
      const reader = new FileReader();
      reader.onload = e => {
        this.uploads.unshift({
          id: Date.now(),
          file: e.target.result,
          type: f.type.startsWith('video') ? 'video' : 'image',
          category: category,
          date: new Date().toISOString(),
          likes: 0,
          desc: ''
        });
        this.saveStorage();
        this.render();
      };
      reader.readAsDataURL(f);
    });
  },

  likeUpload(uploadId) {
    const u = this.uploads.find(x => x.id === uploadId);
    if (u) {
      u.likes = (u.likes || 0) + 1;
      this.saveStorage();
      this.render();
    }
  },

  deleteUpload(uploadId) {
    this.uploads = this.uploads.filter(x => x.id !== uploadId);
    this.saveStorage();
    this.render();
  },

  addComment(text) {
    if (!text.trim()) return;
    this.comments.unshift({
      id: Date.now(),
      text: text,
      date: new Date().toISOString(),
      author: '玩家' + Math.floor(Math.random() * 10000)
    });
    this.saveStorage();
    this.render();
  },

  render() {
    const container = document.getElementById('detailContent');
    const item = this.item;

    container.innerHTML = `
      <div class="detail-header">
        <div class="detail-visual">
          <div class="detail-icon">${item.icon || '👘'}</div>
          <h1 class="detail-name">${item.name}</h1>
          <p style="color:var(--muted)">${item.desc || ''}</p>
        </div>
        <div class="detail-info">
          <div class="info-card">
            <h3>💰 获取方式</h3>
            <div class="info-row">
              <span class="info-label">价格</span>
              <span class="info-value price-value">${item.price || '未知'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">来源</span>
              <span class="info-value">${item.source || '商城'}</span>
            </div>
            ${item.tags ? `<div class="info-row"><span class="info-label">标签</span><span class="info-value">${item.tags.join(' / ')}</span></div>` : ''}
          </div>

          <div class="info-card">
            <h3>📋 时装信息</h3>
            <div class="info-row">
              <span class="info-label">类型</span>
              <span class="info-value">${item.id >= 100 && item.id < 200 ? '发型' : '时装'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">支持染色</span>
              <span class="info-value">${item.dyes ? '是 (' + item.dyes.length + '种配色)' : '未知'}</span>
            </div>
          </div>

          ${item.dyes ? `
          <div class="info-card">
            <h3>🎨 官方染色方案</h3>
            <div class="dye-preview">${item.dyes.map(d => `<div class="dye-dot" style="background:${d}"></div>`).join('')}</div>
          </div>
          ` : ''}
        </div>
      </div>

      ${item.dyes ? `
      <div class="dye-section">
        <h2>🎨 染色方案预览</h2>
        <div class="dye-grid">
          ${item.dyes.map((d, i) => `
            <div class="dye-card">
              <div class="dye-preview">
                <div class="dye-dot" style="background:${d};width:40px;height:40px"></div>
              </div>
              <p>配色 ${i + 1}</p>
              <p style="color:var(--muted);font-size:12px">${d}</p>
            </div>
          `).join('')}
        </div>
      </div>
      ` : ''}

      <div class="upload-section">
        <h2>📸 玩家上传 - 展示你的少东家</h2>
        <div class="upload-tabs">
          <button class="tab-btn active" onclick="showTab('image')">图片展示</button>
          <button class="tab-btn" onclick="showTab('dye')">染色方案</button>
          <button class="tab-btn" onclick="showTab('video')">视频分享</button>
        </div>

        <div class="upload-area" id="uploadArea">
          <div style="font-size:48px;margin-bottom:12px">📤</div>
          <div style="color:var(--text);margin-bottom:8px">拖拽或点击上传你的作品</div>
          <div style="color:var(--muted);font-size:13px">支持图片和视频，无大小限制</div>
          <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none">
        </div>

        <div class="uploads-grid" id="uploadsGrid"></div>
      </div>

      <div class="comments-section">
        <h2>💬 玩家评论 (${this.comments.length})</h2>
        <div class="comment-input">
          <input type="text" id="commentInput" placeholder="分享你对这套时装的看法...">
          <button onclick="DetailPage.addComment(document.getElementById('commentInput').value)">发表</button>
        </div>
        <div class="comment-list" id="commentList"></div>
      </div>
    `;

    // 渲染上传内容
    this.renderUploads('image');
    this.renderComments();

    // 绑定上传事件
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');

    uploadArea.onclick = () => fileInput.click();
    uploadArea.ondragover = e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--gold)'; };
    uploadArea.ondragleave = () => uploadArea.style.borderColor = 'var(--border)';
    uploadArea.ondrop = e => {
      e.preventDefault();
      uploadArea.style.borderColor = 'var(--border)';
      this.handleUpload(e.dataTransfer.files, 'image');
    };
    fileInput.onchange = e => this.handleUpload(e.target.files, 'image');
  },

  renderUploads(category) {
    const grid = document.getElementById('uploadsGrid');
    const filtered = this.uploads.filter(u => category === 'all' || u.category === category);

    grid.innerHTML = filtered.length ? filtered.map(u => `
      <div class="upload-item">
        ${u.type === 'video'
          ? `<video src="${u.file}" class="upload-img" controls></video>`
          : `<img src="${u.file}" class="upload-img" alt="玩家上传">`}
        <div class="upload-meta">
          <p class="upload-desc">${u.desc || '玩家分享'}</p>
          <div class="upload-actions">
            <button class="action-btn ${u.likes > 0 ? 'liked' : ''}" onclick="DetailPage.likeUpload(${u.id})">❤️ ${u.likes || 0}</button>
            <button class="action-btn" onclick="DetailPage.deleteUpload(${u.id})">🗑️ 删除</button>
          </div>
        </div>
      </div>
    `).join('') : '<p style="text-align:center;color:var(--muted);grid-column:1/-1;padding:40px">还没有上传，快来分享你的作品吧！</p>';
  },

  renderComments() {
    const list = document.getElementById('commentList');
    list.innerHTML = this.comments.length ? this.comments.map(c => `
      <div class="comment-item">
        <div class="comment-header">
          <span class="comment-author">${c.author}</span>
          <span class="comment-date">${new Date(c.date).toLocaleDateString()}</span>
        </div>
        <p class="comment-text">${c.text}</p>
      </div>
    `).join('') : '<p style="text-align:center;color:var(--muted);padding:20px">暂无评论</p>';
  }
};

function showTab(cat) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  DetailPage.renderUploads(cat);
}

DetailPage.init();
</script>
</body>
</html>
