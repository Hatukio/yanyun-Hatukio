<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#daa520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- 十六合体字 - 简化书法风格 -->
    <path d="M100 20
             L110 30 L100 40 L90 30 Z
             M85 50 Q100 55 115 50
             L100 75 L85 50
             M100 75 L100 120
             M75 100 L125 100
             M80 130 Q100 140 120 130
             L100 160 L80 130
             M90 170 L110 170"
          stroke="url(#goldGrad)"
          stroke-width="8"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <!-- 增加飞白效果 -->
    <path d="M100 35 Q95 40 100 45"
          stroke="url(#goldGrad)"
          stroke-width="3"
          fill="none"
          opacity="0.7"/>
    <path d="M92 115 L108 115"
          stroke="url(#goldGrad)"
          stroke-width="2"
          fill="none"
          opacity="0.6"/>
  </g>
</svg>
