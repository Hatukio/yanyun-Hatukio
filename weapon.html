// 当前筛选状态
let currentFilter = {tab:'all', hole:'all', color:'all', part:'all'};

// 渲染武器卡片
function renderWeapon() {
const grid = document.getElementById('weapon-grid');
grid.innerHTML = '';

let filtered = weaponData.filter(item => {
if (currentFilter.tab !== 'all') {
if (currentFilter.tab === 'cangyin' && item.category !== 'cangyin') return false;
if (currentFilter.tab === 'shop' && item.category !== 'shop') return false;
if (currentFilter.tab === 'funeng' && item.category !== 'funeng') return false;
if (currentFilter.tab === 'other' && item.category !== 'other') return false;
}
if (currentFilter.hole !== 'all' && item.hole !== parseInt(currentFilter.hole)) return false;
if (currentFilter.part !== 'all' && item.part !== currentFilter.part) return false;
if (currentFilter.color !== 'all') {
const colorMap = {red:'#FF',blue:'#00',green:'#00',gold:'#FFD',purple:'#9',white:'#EE'};
const hasColor = item.colors.some(c=>c.toUpperCase().startsWith(colorMap[currentFilter.color]));
if (!hasColor) return false;
}
return true;
});

filtered.forEach(item => {
const card = document.createElement('div');
card.className = 'weapon-card';
card.onclick = () => openModal(item);
let tagLabel = item.category==='cangyin'?`藏音${item.hole}孔`:item.category==='shop'?'商城':item.category==='funeng'?'赋能':'其他';
card.innerHTML = `
<div class="weapon-visual">
<span class="weapon-tag">${tagLabel}</span>
<span class="weapon-icon">${item.icon}</span>
</div>
<div class="weapon-info">
<h3>${item.name}</h3>
<p class="desc">${item.desc}</p>
<div class="weapon-meta">
<span>${item.hole>0?item.hole+'孔':'-'}</span>
<span>${item.price}</span>
</div>
<div class="color-display">
${item.colors.map(c=>`<div class="color-swatch" style="background:${c}" title="${c}"></div>`).join('')}
</div>
</div>
`;
grid.appendChild(card);
});

// 更新统计
document.getElementById('total-count').textContent = filtered.length;
document.getElementById('cangyin-count').textContent = weaponData.filter(i=>i.category==='cangyin').length;
document.getElementById('shop-count').textContent = weaponData.filter(i=>i.category==='shop').length;
document.getElementById('funeng-count').textContent = weaponData.filter(i=>i.category==='funeng').length;
}

// 打开弹窗
function openModal(item) {
document.getElementById('modal-title').textContent = item.name;
document.getElementById('modal-img').textContent = item.icon;
document.getElementById('modal-source').textContent = item.source;
document.getElementById('modal-price').textContent = item.price;
document.getElementById('modal-date').textContent = item.date;
document.getElementById('modal-type').textContent = item.part==='weapon'?'武器':item.part==='head'?'头饰':item.part==='back'?'背饰':item.part==='face'?'面饰':'-';
document.getElementById('modal-hole').textContent = item.hole>0?item.hole+'孔':'无';

const tags = document.getElementById('modal-tags');
tags.innerHTML = `<span class="tag">${item.category==='cangyin'?'藏音':item.category==='shop'?'商城':item.category==='funeng'?'赋能':'其他'}</span><span class="tag">${item.hole>0?item.hole+'孔':'-'}</span>`;

const colorSection = document.getElementById('color-section');
colorSection.style.display = item.colors ? 'block' : 'none';
const colorGrid = document.getElementById('modal-colors');
colorGrid.innerHTML = item.colors ? item.colors.map(c=>`<div class="modal-color" style="background:${c}" title="${c}"></div>`).join('') : '';

document.getElementById('weapon-modal').classList.add('active');
}

function closeModal() {
document.getElementById('weapon-modal').classList.remove('active');
}

// 标签切换
document.querySelectorAll('.tab-btn').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
currentFilter.tab = btn.dataset.tab;
document.getElementById('cangyin-filter').style.display = btn.dataset.tab === 'cangyin' ? 'block' : 'none';
renderWeapon();
});
});

// 藏音筛选
document.querySelectorAll('#cangyin-filter .filter-btn').forEach(btn => {
btn.addEventListener('click', () => {
const row = btn.parentElement;
row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
if (btn.dataset.hole) currentFilter.hole = btn.dataset.hole;
if (btn.dataset.color) currentFilter.color = btn.dataset.color;
if (btn.dataset.part) currentFilter.part = btn.dataset.part;
renderWeapon();
});
});

// 初始渲染
renderWeapon();
</script>
