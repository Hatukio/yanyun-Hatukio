const weaponData = [

];

// ==================== 武学特效数据 ====================
const effectData = [
// 待补充准确数据...
];

// ==================== 头发染色数据 ====================
const hairData = [
// 待补充准确数据...
];

// 合并所有数据
const allData = [...fashionData, ...weaponData, ...effectData, ...hairData];

let currentCategory = 'fashion'; // fashion/weapon/effect/hair

// 初始化
document.getElementById('fashion-count').textContent = fashionData.length;
document.getElementById('weapon-count').textContent = weaponData.length;
document.getElementById('effect-count').textContent = effectData.length;
document.getElementById('hair-count').textContent = hairData.length;

// 分类点击
document.querySelectorAll('.stat-item').forEach(item => {
item.addEventListener('click', () => {
document.querySelectorAll('.stat-item').forEach(i => i.classList.remove('active'));
item.classList.add('active');
currentCategory = item.dataset.category;
renderData();
});
});

// 分类切换
document.querySelectorAll('.category-btn').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
renderData();
});
});

// 筛选
document.querySelectorAll('.filter-btn').forEach(btn => {
btn.addEventListener('click', () => {
const row = btn.parentElement;
row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
renderData();
});
});

document.getElementById('year-filter').addEventListener('change', renderData);
document.getElementById('search-input').addEventListener('input', renderData);

// 渲染数据
function renderData() {
const grid = document.getElementById('appearance-grid');
const waiting = document.getElementById('waiting-tip');

let category = document.querySelector('.category-btn.active').dataset.category;
let filter = document.querySelector('.filter-btn:not(.grade-btn).active')?.dataset.filter || 'all';
let grade = document.querySelector('.grade-btn.active')?.dataset.grade || 'all';
let year = document.getElementById('year-filter').value;
let search = document.getElementById('search-input').value;

// 根据主分类筛选
let filtered = allData;
if (category === 'fashion_cloth') filtered = allData.filter(d => d.category === 'fashion_cloth');
else if (category === 'weapon_appearance') filtered = allData.filter(d => d.category === 'weapon_appearance');
else if (category === 'weapon_effect') filtered = allData.filter(d => d.category === 'weapon_effect');
else if (category === 'hair_dye') filtered = allData.filter(d => d.category === 'hair_dye');

// 来源筛选
if (filter !== 'all') {
filtered = filtered.filter(d => d.subCategory === filter);
}
// 等级筛选
if (grade !== 'all') {
filtered = filtered.filter(d => d.grade === grade);
}
// 年份筛选
if (year !== 'all') {
filtered = filtered.filter(d => d.date.startsWith(year));
}
// 搜索
if (search) {
filtered = filtered.filter(d => d.name.toLowerCase().includes(search.toLowerCase()));
}

// 显示/隐藏等待提示
if (filtered.length === 0) {
waiting.style.display = 'block';
grid.style.display = 'none';
} else {
waiting.style.display = 'none';
grid.style.display = 'grid';
grid.innerHTML = '';

filtered.forEach(item => {
const card = document.createElement('div');
card.className = 'appearance-card';
card.onclick = () => openModal(item);
let typeLabel = item.subCategory === 'lingyin' ? '聆音' : 
item.subCategory === 'heming' ? '和鸣' :
item.subCategory === 'shop' ? '商城' :
item.subCategory === 'zhanling' ? '战令' :
item.subCategory === 'event' ? '活动' : '其他';
card.innerHTML = `
<div class="appearance-visual" style="background:linear-gradient(135deg,${item.dyes?.[0] || '#1a1a2e'}33,${item.dyes?.[0] || '#1a1a2e'}11)">
<span class="appearance-tag ${item.date.startsWith('2026')?'new':''}">${typeLabel}</span>
<span class="appearance-icon">${item.icon}</span>
</div>
<div class="appearance-info">
<h3>${item.name}</h3>
<p class="desc">${item.desc || ''}</p>
<div class="appearance-meta">
<span>📅 ${item.date}</span>
<span class="price">${item.price || '-'}</span>
</div>
${item.dyes ? `<div class="color-display">${item.dyes.slice(0,5).map(c=>`<div class="color-swatch" style="background:${c}"></div>`).join('')}</div>` : ''}
</div>
`;
grid.appendChild(card);
});
}
}

// 打开弹窗
function openModal(item) {
document.getElementById('modal-title').textContent = item.name;
document.getElementById('modal-img').textContent = item.icon;
document.getElementById('modal-source').textContent = item.source || '-';
document.getElementById('modal-price').textContent = item.price || '-';
document.getElementById('modal-date').textContent = item.date || '-';
document.getElementById('modal-feature').textContent = item.features || '-';

const tags = document.getElementById('modal-tags');
tags.innerHTML = `<span class="tag">${item.grade || ''}</span><span class="tag">${item.category}</span>`;

// 染色
const dyeSection = document.getElementById('dye-section');
if (item.dyes && item.dyes.length > 0) {
dyeSection.style.display = 'block';
document.getElementById('modal-dyes').innerHTML = item.dyes.map(c => `<div class="modal-color" style="background:${c}" title="${c}"></div>`).join('');
} else {
dyeSection.style.display = 'none';
}

document.getElementById('appearance-modal').classList.add('active');
}

function closeModal() {
document.getElementById('appearance-modal').classList.remove('active');
}

// 初始渲染
renderData();
</script>
</body>
