// 渲染特效卡片
function renderEffect(filterSource='all', filterType='all') {
const grid = document.getElementById('effect-grid');
grid.innerHTML = '';

let filtered = effectData.filter(item => {
if (filterSource !== 'all' && item.category !== filterSource) return false;
if (filterType !== 'all' && item.type !== filterType) return false;
return true;
});

filtered.forEach(item => {
const card = document.createElement('div');
card.className = 'effect-card';
card.onclick = () => openModal(item);
card.innerHTML = `
<div class="effect-visual">
<span class="effect-tag">${item.category==='shop'?'商城':item.category==='heming'?'八音窍':item.category==='event'?'活动':'免费'}</span>
<span class="effect-icon">${item.icon}</span>
</div>
<div class="effect-info">
<h3>${item.name}</h3>
<p class="desc">${item.desc}</p>
<div class="effect-meta">
<span>${item.type}</span>
<span>${item.price}</span>
</div>
</div>
`;
grid.appendChild(card);
});

// 更新统计
document.getElementById('total-count').textContent = filtered.length;
document.getElementById('shop-count').textContent = effectData.filter(i=>i.category==='shop').length;
document.getElementById('heming-count').textContent = effectData.filter(i=>i.category==='heming').length;
document.getElementById('event-count').textContent = effectData.filter(i=>i.category==='event').length;
}

// 打开弹窗
function openModal(item) {
document.getElementById('modal-title').textContent = item.name;
document.getElementById('modal-img').textContent = item.icon;
document.getElementById('modal-source').textContent = item.source;
document.getElementById('modal-price').textContent = item.price;
document.getElementById('modal-date').textContent = item.date;
document.getElementById('modal-type').textContent = item.type;

const tags = document.getElementById('modal-tags');
tags.innerHTML = `<span class="tag">${item.category==='shop'?'商城':item.category==='heming'?'八音窍':item.category==='event'?'活动':'免费'}</span><span class="tag">${item.type}</span>`;

document.getElementById('effect-modal').classList.add('active');
}

function closeModal() {
document.getElementById('effect-modal').classList.remove('active');
}

// 标签切换
document.querySelectorAll('.tab-btn').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
const tab = btn.dataset.tab;
let filterSource = 'all';
if (tab === 'shop') filterSource = 'shop';
else if (tab === 'heming') filterSource = 'heming';
else if (tab === 'event') filterSource = 'event';
renderEffect(filterSource, 'all');
});
});

// 筛选
document.querySelectorAll('.filter-btn').forEach(btn => {
btn.addEventListener('click', () => {
btn.classList.toggle('active');
const filterRow = btn.parentElement;
const allBtns = filterRow.querySelectorAll('.filter-btn');
allBtns.forEach(b => b.classList.remove('active'));
btn.classList.add('active');
renderEffect(btn.dataset.filter, 'all');
});
});

// 初始渲染
